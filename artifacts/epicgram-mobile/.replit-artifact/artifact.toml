kind = "mobile"
previewPath = "/epicgram-mobile/"
title = "EPICGRAM Mobile"
version = "1.0.0"
id = "artifacts/epicgram-mobile"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/epicgram-mobile/" ]
localPort = 18759

[services.development]
run = "pnpm --filter @workspace/epicgram-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epicgram-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/epicgram-mobile", "run", "serve" ]

[services.env]
PORT = "18759"
BASE_PATH = "/epicgram-mobile/"
