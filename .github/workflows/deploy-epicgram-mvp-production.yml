name: Deploy EPICGRAM MVP Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy to epic-gram.com
        required: true
        default: feature/epic-ai-os-v4-pa
      confirm:
        description: Type DEPLOY_EPICGRAM_MVP
        required: true

concurrency:
  group: epicgram-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ inputs.confirm == 'DEPLOY_EPICGRAM_MVP' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy production MVP
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" \
            "DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/EpicStarAi/agent-control/${DEPLOY_REF}/scripts/deploy-epicgram-mvp-production.sh" \
            -o /tmp/deploy-epicgram-mvp-production.sh
          chmod +x /tmp/deploy-epicgram-mvp-production.sh
          /tmp/deploy-epicgram-mvp-production.sh
          REMOTE

      - name: Verify public MVP
        run: |
          test "$(curl -ksS -o /dev/null -w '%{http_code}' https://epic-gram.com/login)" = "200"
          test "$(curl -ksS -o /dev/null -w '%{http_code}' https://epic-gram.com/client)" = "200"
          test "$(curl -ksS -o /dev/null -w '%{http_code}' https://epic-gram.com/api/telegram/status)" = "200"
